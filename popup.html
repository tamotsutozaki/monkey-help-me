<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <div id="answer-view" hidden>
      <div class="answer" id="answer"></div>
      <div class="answer-detail" id="answer-detail"></div>
      <div class="meta" id="meta"></div>
    </div>

    <div id="open-view" hidden>
      <div class="open-question" id="open-question"></div>
      <div class="open-text" id="open-text"></div>
      <div class="meta" id="open-meta"></div>
    </div>

    <div id="message-view" hidden>
      <div class="msg-icon" id="msg-icon"></div>
      <div class="msg-text" id="msg-text"></div>
      <button id="open-options" class="btn" hidden>Abrir configurações</button>
    </div>

    <div id="history" class="history" hidden>
      <div class="history-title">Últimas respostas</div>
      <ul id="history-list"></ul>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
